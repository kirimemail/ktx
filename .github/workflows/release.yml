name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        goos:
          - linux
          - darwin
          - windows
        goarch:
          - amd64
          - arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then
            ext=".exe"
          fi
          name="ktx-${GOOS}-${GOARCH}${ext}"
          go build -ldflags="-s -w" -o "$name" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ktx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ktx-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          for f in ktx-*-amd64.exe ktx-*-arm64.exe ktx-*-amd64 ktx-*-arm64; do
            if [ -f "$f" ]; then
              sha256sum "$f" > "${f}.sha256sum"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ktx-linux-amd64
            artifacts/ktx-linux-arm64
            artifacts/ktx-darwin-amd64
            artifacts/ktx-darwin-arm64
            artifacts/ktx-windows-amd64.exe
            artifacts/ktx-windows-arm64.exe
            artifacts/ktx-linux-amd64.sha256sum
            artifacts/ktx-linux-arm64.sha256sum
            artifacts/ktx-darwin-amd64.sha256sum
            artifacts/ktx-darwin-arm64.sha256sum
            artifacts/ktx-windows-amd64.exe.sha256sum
            artifacts/ktx-windows-arm64.exe.sha256sum
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
